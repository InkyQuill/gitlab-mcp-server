name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  gosec:
    name: gosec Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run gosec
        uses: securego/gosec@master
        with:
          # G104: unhandled errors (covered more precisely by errcheck in golangci-lint)
          # G204: subprocess via variable — intentional in ExternalCmdBackend;
          #       shell-injection safety pinned by TestExternalCmdBackend_ShellMetacharsArePassedLiterally
          # G301: directory perms — deliberately 0755 for config dir so user can inspect
          # G304: file path from variable — reviewed case-by-case; ref-based backend is safe
          # G306: file perms — deliberately 0644 for translations cache (non-secret)
          # G703: path traversal taint analysis — false positive on IDE config
          #       paths (bounded by getXxxConfigPath helpers using known system dirs)
          args: -exclude=G104,G204,G301,G304,G306,G703 ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Dependency Review requires GitHub's Dependency graph to be enabled in
    # repo settings → Security → Dependency graph. Until that's on, the
    # action reports "not supported on this repository". Don't block CI on
    # it — the govulncheck and gosec jobs above already cover SCA/SAST.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  token-scan:
    name: Token Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comprehensive scanning

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
