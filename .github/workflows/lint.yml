name: Lint

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        # v7 is required for golangci-lint v2. v6 only supports v1.
        uses: golangci/golangci-lint-action@v7
        with:
          # v2.8.0 is built with Go 1.25.5 and accepts our go 1.25.9 directive.
          # v2.0.2 was still built with Go 1.24 and errors the same way v1 did.
          # v1.x (v1.64.8) was built with Go 1.24 and rejects Go 1.25+ targets.
          version: v2.8.0
          args: --timeout=5m --config=.golangci.yml ./...

  go-vet:
    name: go vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Run go vet
        run: go vet ./...

  gofmt:
    name: gofmt check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not properly formatted:"
            gofmt -s -l .
            exit 1
          fi
