version: "2"
run:
  concurrency: 4
  modules-download-mode: readonly
  tests: true
linters:
  enable:
    - bodyclose
    - durationcheck
    - gosec
    - noctx
    - unconvert
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (*os.File).Close
        - os.Chdir
        - os.Mkdir
        - os.MkdirAll
        - os.Remove
        - os.RemoveAll
        - os.Setenv
        - os.Unsetenv
        - os.Chmod
        - fmt.Fprintf(os.Stderr)
        - fmt.Fprintln(os.Stderr)
        - fmt.Fprintf(os.Stdout)
        - fmt.Fprintln(os.Stdout)
        - (io.Writer).Write
        - fmt.Fprintf
        - fmt.Fprintln
        - (*text/tabwriter.Writer).Flush
    goconst:
      min-occurrences: 5
    gocritic:
      disabled-checks:
        - octalLiteral
        - hugeParam
        - rangeValCopy
        - paramTypeCombine
      enabled-tags:
        - diagnostic
    gosec:
      excludes:
        - G104
        - G301
        - G302
        - G304
        - G306
        - G101
        - G401
        - G501
    govet:
      enable:
        - assign
        - atomic
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - errorsas
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - printf
        - shift
        - stdmethods
        - stringintconv
        - structtag
        - tests
        - unmarshal
        - unreachable
        - unusedresult
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    whitespace:
      multi-if: false
      multi-func: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - goconst
          - gocritic
          - gosec
          - ineffassign
          - noctx
          - staticcheck
          - thelper
          - unparam
          - unused
        path: _test\.go
      # QF1xxx are "quickfix" stylistic suggestions from staticcheck v0.26+
      # (embedded-field shortcuts, tagged-switch conversions, etc.). Useful
      # as IDE hints but too noisy to gate CI on.
      - linters:
          - staticcheck
        text: "^QF"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
